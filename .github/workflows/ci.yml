name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test
      - run: node packages/cli/bin/sloom.js --help
      - run: node packages/cli/bin/sloom.js index examples/skills
      - run: node packages/cli/bin/sloom.js skills lint --strict
      - run: node packages/cli/bin/sloom.js validate examples/bugfix.plan.json
